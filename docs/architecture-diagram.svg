<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1100 720" font-family="Inter, -apple-system, sans-serif">
  <defs>
    <linearGradient id="headerGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#1e3a5f"/>
      <stop offset="100%" stop-color="#2d5a8e"/>
    </linearGradient>
    <linearGradient id="agentGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#2563eb"/>
    </linearGradient>
    <linearGradient id="toolGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="dataGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#d97706"/>
    </linearGradient>
    <linearGradient id="verifyGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="100%" stop-color="#dc2626"/>
    </linearGradient>
    <linearGradient id="obsGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <filter id="shadow" x="-4%" y="-4%" width="108%" height="112%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1100" height="720" rx="12" fill="#0f172a"/>

  <!-- Title -->
  <rect x="0" y="0" width="1100" height="52" rx="12" fill="url(#headerGrad)"/>
  <rect x="0" y="20" width="1100" height="32" fill="url(#headerGrad)"/>
  <text x="550" y="34" text-anchor="middle" fill="white" font-size="18" font-weight="bold">AgentForge Clinical Query Agent &mdash; System Architecture</text>

  <!-- ========== ROW 1: UI Layer ========== -->
  <rect x="30" y="70" width="1040" height="70" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1" filter="url(#shadow)"/>
  <text x="50" y="92" fill="#94a3b8" font-size="11" font-weight="600" letter-spacing="1">UI LAYER</text>
  <rect x="50" y="100" width="150" height="30" rx="6" fill="#334155"/>
  <text x="125" y="120" text-anchor="middle" fill="#e2e8f0" font-size="11">Patient Selector</text>
  <rect x="215" y="100" width="150" height="30" rx="6" fill="#334155"/>
  <text x="290" y="120" text-anchor="middle" fill="#e2e8f0" font-size="11">Quick Prompts (9)</text>
  <rect x="380" y="100" width="150" height="30" rx="6" fill="#334155"/>
  <text x="455" y="120" text-anchor="middle" fill="#e2e8f0" font-size="11">Chat Interface</text>
  <rect x="545" y="100" width="150" height="30" rx="6" fill="#334155"/>
  <text x="620" y="120" text-anchor="middle" fill="#e2e8f0" font-size="11">Tool Badges</text>
  <rect x="710" y="100" width="170" height="30" rx="6" fill="#334155"/>
  <text x="795" y="120" text-anchor="middle" fill="#e2e8f0" font-size="11">Edit Draft / Finalize</text>
  <rect x="895" y="100" width="160" height="30" rx="6" fill="#334155"/>
  <text x="975" y="120" text-anchor="middle" fill="#e2e8f0" font-size="11">Feedback Buttons</text>

  <!-- Arrow: UI to Server -->
  <line x1="550" y1="140" x2="550" y2="160" stroke="#64748b" stroke-width="2" marker-end="url(#arrowGray)"/>
  <defs><marker id="arrowGray" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#64748b"/></marker></defs>

  <!-- ========== ROW 2: Server Layer ========== -->
  <rect x="30" y="160" width="1040" height="70" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1" filter="url(#shadow)"/>
  <text x="50" y="182" fill="#94a3b8" font-size="11" font-weight="600" letter-spacing="1">EXPRESS SERVER</text>
  <rect x="50" y="190" width="130" height="30" rx="6" fill="#334155"/>
  <text x="115" y="210" text-anchor="middle" fill="#e2e8f0" font-size="11">CORS + CSP</text>
  <rect x="195" y="190" width="130" height="30" rx="6" fill="#334155"/>
  <text x="260" y="210" text-anchor="middle" fill="#e2e8f0" font-size="11">Rate Limit</text>
  <rect x="340" y="190" width="160" height="30" rx="6" fill="#334155"/>
  <text x="420" y="210" text-anchor="middle" fill="#e2e8f0" font-size="11">Session Mgmt (20)</text>
  <rect x="515" y="190" width="150" height="30" rx="6" fill="#334155"/>
  <text x="590" y="210" text-anchor="middle" fill="#e2e8f0" font-size="11">POST /api/chat</text>
  <rect x="680" y="190" width="170" height="30" rx="6" fill="#334155"/>
  <text x="765" y="210" text-anchor="middle" fill="#e2e8f0" font-size="11">Document CRUD</text>
  <rect x="865" y="190" width="190" height="30" rx="6" fill="#334155"/>
  <text x="960" y="210" text-anchor="middle" fill="#e2e8f0" font-size="11">POST /api/feedback</text>

  <!-- Arrow: Server to Agent -->
  <line x1="550" y1="230" x2="550" y2="255" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <defs><marker id="arrowBlue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#3b82f6"/></marker></defs>

  <!-- ========== ROW 3: Agent Core ========== -->
  <rect x="200" y="255" width="700" height="65" rx="10" fill="url(#agentGrad)" filter="url(#shadow)" opacity="0.95"/>
  <text x="550" y="280" text-anchor="middle" fill="white" font-size="14" font-weight="bold">LangChain.js Agent (Claude Sonnet 4)</text>
  <text x="550" y="300" text-anchor="middle" fill="#dbeafe" font-size="11">createToolCallingAgent + AgentExecutor (max 10 iterations, 60s timeout)</text>

  <!-- Arrows: Agent to Tools -->
  <line x1="550" y1="320" x2="550" y2="345" stroke="#10b981" stroke-width="2" marker-end="url(#arrowGreen)"/>
  <defs><marker id="arrowGreen" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#10b981"/></marker></defs>

  <!-- ========== ROW 4: Tools ========== -->
  <rect x="30" y="345" width="1040" height="120" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1" filter="url(#shadow)"/>
  <text x="50" y="367" fill="#94a3b8" font-size="11" font-weight="600" letter-spacing="1">10 TOOLS (Zod schema + JSON.stringify return)</text>

  <!-- Tool Row 1: MVP tools -->
  <rect x="50" y="375" width="185" height="28" rx="6" fill="url(#toolGrad)" opacity="0.85"/>
  <text x="142" y="394" text-anchor="middle" fill="white" font-size="10" font-weight="600">get_patient_summary</text>
  <rect x="245" y="375" width="155" height="28" rx="6" fill="url(#toolGrad)" opacity="0.85"/>
  <text x="322" y="394" text-anchor="middle" fill="white" font-size="10" font-weight="600">get_medications</text>
  <rect x="410" y="375" width="185" height="28" rx="6" fill="url(#toolGrad)" opacity="0.85"/>
  <text x="502" y="394" text-anchor="middle" fill="white" font-size="10" font-weight="600">drug_interaction_check</text>
  <rect x="605" y="375" width="140" height="28" rx="6" fill="url(#toolGrad)" opacity="0.85"/>
  <text x="675" y="394" text-anchor="middle" fill="white" font-size="10" font-weight="600">allergy_check</text>
  <rect x="755" y="375" width="145" height="28" rx="6" fill="url(#toolGrad)" opacity="0.85"/>
  <text x="827" y="394" text-anchor="middle" fill="white" font-size="10" font-weight="600">get_lab_results</text>

  <!-- Tool Row 2: Bounty tools -->
  <rect x="50" y="412" width="165" height="28" rx="6" fill="#047857" opacity="0.9"/>
  <text x="132" y="431" text-anchor="middle" fill="white" font-size="10" font-weight="600">get_encounter_data</text>
  <rect x="225" y="412" width="185" height="28" rx="6" fill="#047857" opacity="0.9"/>
  <text x="317" y="431" text-anchor="middle" fill="white" font-size="10" font-weight="600">reconcile_medications</text>
  <rect x="420" y="412" width="200" height="28" rx="6" fill="#047857" opacity="0.9"/>
  <text x="520" y="431" text-anchor="middle" fill="white" font-size="10" font-weight="600">draft_discharge_summary</text>
  <rect x="630" y="412" width="230" height="28" rx="6" fill="#047857" opacity="0.9"/>
  <text x="745" y="431" text-anchor="middle" fill="white" font-size="10" font-weight="600">generate_discharge_instructions</text>
  <rect x="870" y="412" width="140" height="28" rx="6" fill="#047857" opacity="0.9"/>
  <text x="940" y="431" text-anchor="middle" fill="white" font-size="10" font-weight="600">save_to_chart</text>

  <!-- Legend: MVP vs Bounty -->
  <rect x="915" y="375" width="12" height="12" rx="2" fill="url(#toolGrad)" opacity="0.85"/>
  <text x="932" y="386" fill="#94a3b8" font-size="9">MVP</text>
  <rect x="965" y="375" width="12" height="12" rx="2" fill="#047857"/>
  <text x="982" y="386" fill="#94a3b8" font-size="9">Bounty</text>

  <!-- Arrows: Tools to Data Sources -->
  <line x1="350" y1="465" x2="250" y2="505" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrowYellow)"/>
  <line x1="550" y1="465" x2="550" y2="505" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrowYellow)"/>
  <line x1="750" y1="465" x2="850" y2="505" stroke="#f59e0b" stroke-width="2" marker-end="url(#arrowYellow)"/>
  <defs><marker id="arrowYellow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#f59e0b"/></marker></defs>

  <!-- ========== ROW 5: Data Sources ========== -->
  <rect x="30" y="505" width="1040" height="70" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1" filter="url(#shadow)"/>
  <text x="50" y="527" fill="#94a3b8" font-size="11" font-weight="600" letter-spacing="1">DATA SOURCES</text>

  <rect x="70" y="535" width="250" height="30" rx="6" fill="url(#dataGrad)" opacity="0.9"/>
  <text x="195" y="555" text-anchor="middle" fill="white" font-size="11" font-weight="600">Mock JSON / OpenEMR FHIR R4</text>

  <rect x="340" y="535" width="200" height="30" rx="6" fill="url(#dataGrad)" opacity="0.9"/>
  <text x="440" y="555" text-anchor="middle" fill="white" font-size="11" font-weight="600">OpenFDA Drug Labels</text>

  <rect x="560" y="535" width="220" height="30" rx="6" fill="url(#dataGrad)" opacity="0.9"/>
  <text x="670" y="555" text-anchor="middle" fill="white" font-size="11" font-weight="600">DailyMed REST (NLM/NIH)</text>

  <rect x="800" y="535" width="250" height="30" rx="6" fill="url(#dataGrad)" opacity="0.9"/>
  <text x="925" y="555" text-anchor="middle" fill="white" font-size="11" font-weight="600">In-Memory Document Store</text>

  <!-- ========== ROW 6: Verification + Observability ========== -->
  <!-- Verification -->
  <rect x="30" y="595" width="520" height="110" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1" filter="url(#shadow)"/>
  <text x="50" y="617" fill="#94a3b8" font-size="11" font-weight="600" letter-spacing="1">VERIFICATION LAYER (post-LLM)</text>

  <rect x="50" y="625" width="155" height="26" rx="5" fill="url(#verifyGrad)" opacity="0.85"/>
  <text x="127" y="643" text-anchor="middle" fill="white" font-size="10">Drug Severity Gate</text>
  <rect x="215" y="625" width="140" height="26" rx="5" fill="url(#verifyGrad)" opacity="0.85"/>
  <text x="285" y="643" text-anchor="middle" fill="white" font-size="10">Allergy Conflicts</text>
  <rect x="365" y="625" width="130" height="26" rx="5" fill="url(#verifyGrad)" opacity="0.85"/>
  <text x="430" y="643" text-anchor="middle" fill="white" font-size="10">Critical Lab Flags</text>

  <rect x="50" y="658" width="155" height="26" rx="5" fill="url(#verifyGrad)" opacity="0.85"/>
  <text x="127" y="676" text-anchor="middle" fill="white" font-size="10">Med Change Alerts</text>
  <rect x="215" y="658" width="155" height="26" rx="5" fill="url(#verifyGrad)" opacity="0.85"/>
  <text x="292" y="676" text-anchor="middle" fill="white" font-size="10">Source Attribution</text>
  <rect x="380" y="658" width="155" height="26" rx="5" fill="url(#verifyGrad)" opacity="0.85"/>
  <text x="457" y="676" text-anchor="middle" fill="white" font-size="10">Medical Disclaimer</text>

  <!-- Observability -->
  <rect x="570" y="595" width="500" height="110" rx="10" fill="#1e293b" stroke="#334155" stroke-width="1" filter="url(#shadow)"/>
  <text x="590" y="617" fill="#94a3b8" font-size="11" font-weight="600" letter-spacing="1">OBSERVABILITY + TESTING</text>

  <rect x="590" y="625" width="140" height="26" rx="5" fill="url(#obsGrad)" opacity="0.85"/>
  <text x="660" y="643" text-anchor="middle" fill="white" font-size="10">Langfuse Traces</text>
  <rect x="740" y="625" width="150" height="26" rx="5" fill="url(#obsGrad)" opacity="0.85"/>
  <text x="815" y="643" text-anchor="middle" fill="white" font-size="10">232 Unit Tests</text>
  <rect x="900" y="625" width="155" height="26" rx="5" fill="url(#obsGrad)" opacity="0.85"/>
  <text x="977" y="643" text-anchor="middle" fill="white" font-size="10">79 Eval Cases</text>

  <rect x="590" y="658" width="140" height="26" rx="5" fill="url(#obsGrad)" opacity="0.85"/>
  <text x="660" y="676" text-anchor="middle" fill="white" font-size="10">Session Tracking</text>
  <rect x="740" y="658" width="150" height="26" rx="5" fill="url(#obsGrad)" opacity="0.85"/>
  <text x="815" y="676" text-anchor="middle" fill="white" font-size="10">87.3% Pass Rate</text>
  <rect x="900" y="658" width="155" height="26" rx="5" fill="url(#obsGrad)" opacity="0.85"/>
  <text x="977" y="676" text-anchor="middle" fill="white" font-size="10">Feedback Logging</text>

  <!-- Arrow from Agent to Verification (side) -->
  <path d="M 200 290 L 100 290 L 100 640 L 30 640" stroke="#ef4444" stroke-width="1.5" fill="none" stroke-dasharray="4,3" marker-end="url(#arrowRed)"/>
  <defs><marker id="arrowRed" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#ef4444"/></marker></defs>

  <!-- Arrow from Agent to Observability (side) -->
  <path d="M 900 290 L 1020 290 L 1020 640 L 1070 640" stroke="#8b5cf6" stroke-width="1.5" fill="none" stroke-dasharray="4,3" marker-end="url(#arrowPurple)"/>
  <defs><marker id="arrowPurple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#8b5cf6"/></marker></defs>
</svg>